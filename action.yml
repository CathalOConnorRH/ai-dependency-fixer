name: 'AI Dependency Fixer'
description: 'Automatically fix breaking changes from dependency update PRs using AI'
branding:
  icon: 'tool'
  color: 'blue'

inputs:
  ai-api-key:
    description: 'API key for the chosen AI provider'
    required: true
  ai-provider:
    description: 'AI provider to use: anthropic, openai, or openai-compatible'
    required: false
    default: 'anthropic'
  ai-base-url:
    description: 'Base URL for OpenAI-compatible self-hosted models (e.g. http://localhost:11434/v1)'
    required: false
    default: ''
  max-attempts:
    description: 'Maximum number of fix attempts before giving up'
    required: false
    default: '3'
  test-command:
    description: 'Test command to run. Use "auto" for automatic detection'
    required: false
    default: 'auto'
  install-command:
    description: 'Dependency install command. Use "auto" for automatic detection'
    required: false
    default: 'auto'
  max-diff-lines:
    description: 'Maximum lines in AI-generated diff before rejecting (safety guardrail)'
    required: false
    default: '200'
  ai-model:
    description: 'Model to use (defaults depend on provider: claude-sonnet-4-20250514 for Anthropic, gpt-4o for OpenAI)'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for PR comments'
    required: false
    default: ${{ github.token }}

outputs:
  result:
    description: 'Result of the fix attempt: "fixed", "already-passing", "failed"'
    value: ${{ steps.fix-loop.outputs.result }}
  attempts:
    description: 'Number of fix attempts made'
    value: ${{ steps.fix-loop.outputs.attempts }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install AI provider dependencies
      shell: bash
      run: |
        case "${{ inputs.ai-provider }}" in
          anthropic)
            pip install anthropic
            ;;
          openai|openai-compatible)
            pip install openai
            ;;
          *)
            echo "::error::Unknown AI provider: ${{ inputs.ai-provider }}. Use: anthropic, openai, or openai-compatible"
            exit 1
            ;;
        esac

    - name: Detect language and commands
      id: detect
      shell: bash
      run: bash ${{ github.action_path }}/scripts/detect-language.sh
      env:
        INPUT_TEST_COMMAND: ${{ inputs.test-command }}
        INPUT_INSTALL_COMMAND: ${{ inputs.install-command }}

    - name: Install project dependencies
      shell: bash
      run: |
        echo "::group::Installing dependencies"
        eval "${{ steps.detect.outputs.install_cmd }}"
        echo "::endgroup::"

    - name: Run fix loop
      id: fix-loop
      shell: bash
      run: bash ${{ github.action_path }}/scripts/fix-loop.sh
      env:
        TEST_CMD: ${{ steps.detect.outputs.test_cmd }}
        INSTALL_CMD: ${{ steps.detect.outputs.install_cmd }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        MAX_DIFF_LINES: ${{ inputs.max-diff-lines }}
        AI_PROVIDER: ${{ inputs.ai-provider }}
        AI_MODEL: ${{ inputs.ai-model }}
        AI_BASE_URL: ${{ inputs.ai-base-url }}
        AI_API_KEY: ${{ inputs.ai-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.ai-provider == 'anthropic' && inputs.ai-api-key || '' }}
        OPENAI_API_KEY: ${{ inputs.ai-provider != 'anthropic' && inputs.ai-api-key || '' }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SCRIPTS_DIR: ${{ github.action_path }}/scripts
