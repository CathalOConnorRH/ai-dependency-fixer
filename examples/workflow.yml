# Add this file to your repo at .github/workflows/ai-dependency-fix.yml
name: AI Dependency Fix

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-fix:
    # Only run on dependency update PRs from bots
    if: >
      github.actor == 'renovate[bot]' ||
      github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- Pick ONE of the provider examples below ---

      # Option 1: Anthropic (Claude) — default
      - uses: your-org/ai-dependency-fixer@v1
        with:
          ai-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # ai-provider: anthropic            # default
          # ai-model: claude-sonnet-4-20250514  # default
          # max-attempts: 3
          # max-diff-lines: 200

      # Option 2: OpenAI (GPT)
      # - uses: your-org/ai-dependency-fixer@v1
      #   with:
      #     ai-provider: openai
      #     ai-api-key: ${{ secrets.OPENAI_API_KEY }}
      #     # ai-model: gpt-4o               # default

      # Option 3: Self-hosted (OpenAI-compatible API)
      # - uses: your-org/ai-dependency-fixer@v1
      #   with:
      #     ai-provider: openai-compatible
      #     ai-api-key: 'not-needed'
      #     ai-base-url: 'http://localhost:11434/v1'
      #     ai-model: 'llama3'
